<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS: Sözcük Operasyonu - Tam Liste</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Chakra+Petch:wght@400;600;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* CS2 Theme Colors */
        :root {
            --cs-orange: #de9b35;
            --cs-dark: #0d1116;
            --cs-gray: #1b1f27;
            --cs-text: #b8b8b8;
        }

        body { 
            font-family: 'Rajdhani', sans-serif; 
            background-color: var(--cs-dark); 
            color: #fff; 
            background-image: radial-gradient(circle at 50% 50%, #1f232a 0%, #0d1116 100%);
        }
        
        h1, h2, h3, .tactical-font { font-family: 'Black Ops One', cursive; letter-spacing: 1px; }
        .hud-font { font-family: 'Chakra Petch', sans-serif; }
        
        /* Level Card Styles */
        .level-card { 
            background: linear-gradient(90deg, rgba(30,35,45,0.9) 0%, rgba(20,25,35,0.8) 100%);
            border-left: 4px solid #333;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .level-card:hover { 
            transform: translateX(5px); 
            background: rgba(45,50,60,0.9);
            border-left-color: var(--cs-orange);
            box-shadow: -5px 0 15px rgba(222, 155, 53, 0.2); 
        }

        /* Aktif Görev Animasyonu */
        .current-mission {
            border-left-color: #fbbf24 !important; 
            background: linear-gradient(90deg, rgba(251, 191, 36, 0.1) 0%, rgba(20,25,35,0.8) 100%) !important;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.15);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d1116; }
        ::-webkit-scrollbar-thumb { background: var(--cs-orange); }

        /* Scanline Animation */
        .scanline {
            width: 100%; height: 2px; z-index: 10;
            background: rgba(222, 155, 53, 0.1);
            position: absolute; top: 0;
            animation: scan 3s linear infinite;
            pointer-events: none;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        
        .hidden { display: none !important; }
        .login-box { z-index: 50; position: relative; }
        
        /* Rakam Butonları */
        .number-btn { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-family: 'Black Ops One', cursive; font-size: 1.5rem; background: #1f2937; border: 1px solid #4b5563; color: #9ca3af; transition: all 0.2s; cursor: pointer; }
        .number-btn:hover { background: #374151; color: white; border-color: var(--cs-orange); }
        .number-btn.active { background: var(--cs-orange); color: black; border-color: #fbbf24; }

        /* CS Button Style */
        .cs-btn {
            background: linear-gradient(180deg, #de9b35 0%, #b07015 100%);
            border: 1px solid #ffbf60;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 0 #7a4a0a;
            transition: all 0.1s;
        }
        .cs-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #7a4a0a;
        }
        
        /* Gmail Button */
        .gmail-btn {
            background: linear-gradient(180deg, #D44638 0%, #B23121 100%);
            border: 1px solid #E57373;
            box-shadow: 0 4px 0 #8B2515;
        }
        .gmail-btn:active {
            box-shadow: 0 0 0 #8B2515;
            transform: translateY(4px);
        }

        /* --- MODAL VE TABLO STİLLERİ --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
            z-index: 100; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: #14171f; border: 1px solid #de9b35; width: 95%; max-width: 600px;
            max-height: 85vh; overflow-y: auto; position: relative;
            box-shadow: 0 0 50px rgba(222, 155, 53, 0.15);
            transform: scale(0.95); transition: transform 0.3s;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden selection:bg-orange-500 selection:text-white">

    <div class="scanline"></div>

    <div id="login-screen" class="flex items-center justify-center min-h-screen p-4 bg-[url('https://cdn.cloudflare.steamstatic.com/steamcommunity/public/images/clans/3381077/89e57849206d445348981440e74f329971936c64.png')] bg-cover bg-center">
        <div class="absolute inset-0 bg-gray-900/90 backdrop-blur-sm z-0"></div>
        
        <div class="login-box bg-gray-800/95 p-8 border border-gray-600 shadow-[0_0_50px_rgba(0,0,0,0.8)] max-w-md w-full text-center relative overflow-hidden">
            <div class="absolute top-0 right-0 w-16 h-16 border-t-4 border-r-4 border-orange-500"></div>
            <div class="absolute bottom-0 left-0 w-16 h-16 border-b-4 border-l-4 border-orange-500"></div>

            <div class="mb-6 relative">
                <i class="fas fa-crosshairs text-6xl text-orange-500 animate-spin-slow" style="animation-duration: 10s;"></i>
                <i class="fas fa-user-secret absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-2xl text-white"></i>
            </div>
            <h1 class="text-4xl text-white mb-1 tracking-widest uppercase italic">CS: R HECE</h1>
            <h2 class="text-orange-500 mb-6 tracking-widest uppercase text-sm font-bold">Anlamsız Hece Operasyonu</h2>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="block text-xs font-bold text-orange-400 mb-1 tracking-wider uppercase"><i class="fas fa-id-card mr-1"></i> Operatör Adı</label>
                    <input type="text" id="player-name" class="w-full bg-gray-900 border border-gray-600 p-3 text-white focus:outline-none focus:border-orange-500 transition font-mono" placeholder="Örn: Aybars">
                </div>
            </div>

            <button type="button" onclick="startGame()" class="mt-8 w-full cs-btn text-white font-bold py-4 text-lg group cursor-pointer">
                OPERASYONU BAŞLAT <i class="fas fa-angle-double-right ml-2 group-hover:translate-x-1 transition"></i>
            </button>
            
            <div class="mt-8 border-t border-gray-700 pt-4">
                <p class="text-[10px] text-gray-500 font-mono tracking-widest uppercase opacity-70">
                    HAZIRLAYAN VE KONTROL EDENLER: <br> 
                    <span class="text-orange-600 font-bold">stj.dkt.Mehmet Hanefi Bulduk</span><br>
                    <span class="text-orange-600 font-bold">stj.dkt.Zeynep Akdağ</span><br>
                    <span class="text-orange-600 font-bold">stj.dkt.Zeynep Sıla Mutlu</span>
                </p>
            </div>
        </div>
    </div>

    <div id="game-dashboard" class="hidden min-h-screen bg-[#0d1116] pb-20">
        
        <header class="bg-[#1b1f27] border-b border-orange-900/30 sticky top-0 z-40 shadow-lg">
            <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="bg-orange-600 text-black font-bold w-8 h-8 flex items-center justify-center rounded">R</div>
                    <div>
                        <h2 id="display-name" class="font-bold text-xl leading-tight text-white hud-font tracking-wide uppercase">OPERATOR</h2>
                    </div>
                </div>
                <button onclick="location.reload()" class="text-xs text-red-500 border border-red-900 px-3 py-1 bg-red-900/10 hover:bg-red-900 hover:text-white transition uppercase">ÇIKIŞ</button>
            </div>
        </header>

        <main class="max-w-5xl mx-auto px-4 py-8">
            <div id="content-area" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </main>
    </div>

    <div id="mission-modal" class="modal-overlay">
        <div class="bg-[#14171f] border-2 border-orange-500 p-6 w-full max-w-lg relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-500 hover:text-white text-2xl">&times;</button>
            
            <div id="step-drill">
                <h3 id="modal-title" class="text-xl tactical-font text-orange-500 mb-2 text-center">GÜN X</h3>
                <div class="text-center py-4 bg-black/30 rounded mb-4 border border-gray-800">
                    <div id="syllable-display" class="text-9xl font-black text-white/90 mb-2 uppercase italic">RA</div>
                    <p class="text-orange-500 font-mono text-2xl" id="counter">1 / 20</p>
                    <p class="text-[10px] text-gray-500 mt-2 uppercase">HECEYİ OKU VE KENDİNİ PUANLA (1-5)</p>
                </div>
                <div class="grid grid-cols-5 gap-2 mb-2">
                    <button onclick="recordRep(1)" class="number-btn rounded">1</button>
                    <button onclick="recordRep(2)" class="number-btn rounded">2</button>
                    <button onclick="recordRep(3)" class="number-btn rounded">3</button>
                    <button onclick="recordRep(4)" class="number-btn rounded">4</button>
                    <button onclick="recordRep(5)" class="number-btn rounded">5</button>
                </div>
            </div>

            <div id="step-parent" class="hidden text-center">
                <h3 class="text-xl tactical-font text-yellow-500 mb-6">EBEVEYN PUANI</h3>
                <div class="grid grid-cols-5 gap-2 mb-8">
                    <button onclick="setParentRate(1)" class="number-btn parent-btn rounded">1</button>
                    <button onclick="setParentRate(2)" class="number-btn parent-btn rounded">2</button>
                    <button onclick="setParentRate(3)" class="number-btn parent-btn rounded">3</button>
                    <button onclick="setParentRate(4)" class="number-btn parent-btn rounded">4</button>
                    <button onclick="setParentRate(5)" class="number-btn parent-btn rounded">5</button>
                </div>
                <div class="bg-gray-800 p-4 rounded border border-gray-700 mb-4">
                    <audio id="audio-player" controls class="w-full h-8 mb-3"></audio>
                    <a id="dl-btn" class="block w-full text-center bg-blue-900/30 border border-blue-600 text-blue-400 text-xs py-2 rounded hover:bg-blue-900 cursor-pointer transition uppercase font-bold" download>Kaydı İndir (Mail İçin)</a>
                </div>
                <button onclick="saveMission()" class="cs-btn w-full py-3 text-white font-bold tracking-widest">KAYDET VE TAMAMLA</button>
            </div>
            
            <div id="step-mail" class="hidden text-center">
                <h3 class="text-xl tactical-font text-blue-400 mb-6 uppercase">Rapor Gönder</h3>
                <div class="space-y-3">
                    <button onclick="submitMail('gmail')" class="gmail-btn w-full py-3 text-white font-bold rounded flex items-center justify-center gap-2 uppercase"><i class="fab fa-google"></i> Gmail ile Gönder</button>
                    <button onclick="submitMail('mailto')" class="cs-btn w-full py-3 text-white font-bold rounded flex items-center justify-center gap-2 uppercase"><i class="fas fa-envelope"></i> Uygulama ile Gönder</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const RECIPIENTS = "mehmethanefibulduk@gmail.com,zeynepsilamutlu@gmail.com,zeynepakda.z@gmail.com";
        
        // CSV Tablosundan Birebir Alınan Veriler (Sıralı, Ekleme/Çıkarma Yok)
        const syllableData = {
            d1: ["r", "r", "r", "r", "r", "ra", "ra", "ra", "ra", "ra", "ru", "ru", "ru", "ru", "ru", "ro", "ro", "ro", "ro", "ro"],
            d2: ["r", "r", "r", "r", "r", "re", "re", "re", "re", "re", "ri", "ri", "ri", "ri", "ri", "rö", "rö", "rö", "rö", "rö"],
            d3: ["r", "r", "r", "r", "r", "rı", "rı", "rı", "rı", "rı", "rü", "rü", "rü", "rü", "rü", "ru", "ru", "ru", "ru", "ru"],
            d4: ["r", "r", "r", "r", "r", "ro", "ro", "ro", "ro", "ro", "ru", "ru", "ru", "ru", "ru", "rü", "rü", "rü", "rü", "rü"],
            d5: ["r", "r", "r", "r", "r", "ra", "ra", "ra", "re", "re", "rö", "rö", "rö", "rö", "rö", "ro", "ro", "ro", "ro", "ro"],
            d6: ["r", "r", "r", "r", "r", "ri", "ri", "rı", "rı", "rı", "ru", "ru", "ru", "ru", "ru", "rü", "rü", "rü", "rü", "rü"],
            d7: ["r", "r", "ra", "ra", "re", "re", "ro", "ro", "ro", "ru", "ru", "ru", "rü", "rü", "rü", "ro", "ro", "ro", "rö", "rö"]
        };

        let state = { name: "", progress: {} };
        let currentDay = 1, reps = 1;
        let childScores = [];
        let parentRate = 0;
        let recorder, chunks = [];
        let activeReportDay = 0;
        
        let currentDayList = [];

        function startGame() {
            const n = document.getElementById('player-name').value.trim();
            if(!n) return alert("İsim giriniz!");
            state.name = n;
            const saved = localStorage.getItem(`cs_r_syllable_v6_${n.toLowerCase()}`);
            if(saved) state = JSON.parse(saved);
            document.getElementById('display-name').innerText = n.toUpperCase();
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('game-dashboard').classList.remove('hidden');
            renderCards();
        }

        function renderCards() {
            const area = document.getElementById('content-area');
            area.innerHTML = '';
            for(let d=1; d<=7; d++) {
                const sData = state.progress[`d${d}`];
                
                const status = sData ? `<span class="text-green-400 font-bold">[${sData.parent}/5]</span>` : "BAŞLA";
                const style = sData ? "border-green-600 bg-green-900/20 text-green-500" : "border-gray-600 text-gray-400 hover:border-orange-500 hover:text-white";

                area.innerHTML += `
                    <div class="level-card p-5 rounded shadow-lg flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-center border-b border-gray-700 pb-2 mb-4">
                                <h3 class="font-bold text-orange-500 tactical-font text-lg">GÜN ${d}</h3>
                                <i class="fas fa-calendar-day text-gray-600"></i>
                            </div>
                            <div class="space-y-3">
                                <button onclick="openMission(${d})" class="w-full text-left px-3 py-4 border ${style} rounded text-lg font-bold flex justify-between items-center transition uppercase">
                                    GÜN ${d} GÖREVİ ${status}
                                </button>
                            </div>
                        </div>
                        <button onclick="openMailModal(${d})" class="mt-6 w-full py-2 bg-blue-900/30 border border-blue-600 text-blue-400 hover:bg-blue-800 hover:text-white text-xs font-bold rounded uppercase">Raporu Gönder</button>
                    </div>`;
            }
        }

        async function openMission(d) {
            currentDay = d; reps = 1; childScores = []; parentRate = 0;
            
            // Tablodaki veriyi birebir alıyoruz (Karıştırma veya ekleme yok)
            currentDayList = [...syllableData[`d${d}`]];

            updateSyllableDisplay();
            document.getElementById('modal-title').innerText = `GÜN ${d}`;
            document.getElementById('counter').innerText = `1 / ${currentDayList.length}`;
            
            document.getElementById('step-drill').classList.remove('hidden');
            document.getElementById('step-parent').classList.add('hidden');
            document.getElementById('step-mail').classList.add('hidden');
            document.querySelectorAll('.parent-btn').forEach(b => b.classList.remove('active'));
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                recorder = new MediaRecorder(stream);
                chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/mp3' });
                    const url = URL.createObjectURL(blob);
                    document.getElementById('audio-player').src = url;
                    const fileName = `${state.name.replace(/\s+/g, '_')}_Gun${currentDay}.mp3`;
                    document.getElementById('dl-btn').href = url;
                    document.getElementById('dl-btn').download = fileName;
                };
                recorder.start();
                document.getElementById('mission-modal').classList.add('active');
            } catch(e) { alert("Mikrofon hatası!"); }
        }

        function updateSyllableDisplay() {
            document.getElementById('syllable-display').innerText = currentDayList[reps - 1];
        }

        function recordRep(score) {
            childScores.push(score);
            if(reps < currentDayList.length) {
                reps++;
                document.getElementById('counter').innerText = `${reps} / ${currentDayList.length}`;
                updateSyllableDisplay();
            } else {
                recorder.stop();
                document.getElementById('step-drill').classList.add('hidden');
                document.getElementById('step-parent').classList.remove('hidden');
            }
        }

        function setParentRate(val) {
            parentRate = val;
            document.querySelectorAll('.parent-btn').forEach((b, i) => b.classList.toggle('active', i + 1 === val));
        }

        function saveMission() {
            if(!parentRate) return alert("Puan verin!");
            
            state.progress[`d${currentDay}`] = { 
                child: childScores, 
                parent: parentRate,
                syllables: currentDayList 
            };
            
            localStorage.setItem(`cs_r_syllable_v6_${state.name.toLowerCase()}`, JSON.stringify(state));
            confetti({ particleCount: 150, spread: 60, origin: { y: 0.6 } });
            closeModal();
            renderCards();
        }

        function openMailModal(day) {
            activeReportDay = day;
            if(!state.progress[`d${day}`]) return alert("Bu güne ait tamamlanmış görev yok!");
            document.getElementById('step-drill').classList.add('hidden');
            document.getElementById('step-parent').classList.add('hidden');
            document.getElementById('step-mail').classList.remove('hidden');
            document.getElementById('mission-modal').classList.add('active');
        }

        function submitMail(method) {
            const day = activeReportDay;
            const sData = state.progress[`d${day}`];
            const subject = `CS Raporu: ${state.name} - Gün ${day}`;
            
            let body = `OPERATÖR: ${state.name.toUpperCase()}\nKONU: GÜN ${day} RAPORU\n\n`;
            
            if(sData) {
                const list = sData.syllables || syllableData[`d${day}`];
                body += `EBEVEYN PUANI: [ ${sData.parent} / 5 ]\n`;
                body += `OKUNAN HECELER: ${list.join(' - ')}\n`;
                body += `ÇOCUK PUANLARI (${sData.child.length} Tekrar): ${sData.child.join(' - ')}\n\n`;
            }
            
            body += `NOT: İndirilen ses dosyasını bu maile eklemeyi unutmayın!`;
            
            if(method === 'gmail') window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${RECIPIENTS}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`, '_blank');
            else window.location.href = `mailto:${RECIPIENTS}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            
            closeModal();
        }

        function closeModal() { document.getElementById('mission-modal').classList.remove('active'); }
    </script>
</body>
</html>
